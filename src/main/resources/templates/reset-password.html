<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family:sans-serif;max-width:600px;margin:auto;padding:24px">
<h2>Password Reset Request</h2>
<p>Hi <span th:text="${username}">User</span>,</p>
<p>Click the button below to reset your password. This link expires in
    <strong th:text="${expiryHours}">24</strong> hours.</p>
<a th:href="${resetLink}"
   style="display:inline-block;padding:12px 24px;background:#DC2626;color:#fff;border-radius:6px;text-decoration:none">
    Reset my password
</a>
<p style="color:#888;font-size:12px;margin-top:32px">
    If you didn't request this, you can safely ignore this email.
    Your password will not change.
</p>
</body>
</html>
