item:
  queries:
    divisionsByStoreId: |
      SELECT 
      	DISTINCT(d.DIVISION_NAME_ID), 
          d.DIVISION, 
          d.DIVNAME
      FROM 
      	division d,
          fact_store_authorized_items fsai
      WHERE 
          d.DIVISION_NAME_ID = fsai.DIVISION_NAME_ID AND 
          fsai.STORE_ID = :storeId
      ORDER BY DIVISION_NAME_ID
    commoditiesByStoreId: |
      SELECT 
      	DISTINCT(c.COMMODITY_ID), 
          c.COMMODITY
      FROM 
      	commodity c,
          fact_store_authorized_items fsai
      WHERE 
          c.COMMODITY_ID = fsai.COMMODITY_ID AND 
          fsai.STORE_ID = :storeId
      ORDER BY COMMODITY_ID
    itemCount: |
            SELECT
              COUNT(*)
            FROM 
              fact_store_authorized_items fsai,
              products p
            WHERE
               p.PRODUCT_ID = fsai.ITEM_ID AND
               fsai.STORE_ID = :storeId
    allItems: |
      SELECT
      DIVISION_NAME_ID as division,
      COMMODITY_ID as COMMODITY,
      p.UPC_CODE,
      p.PRODUCT_ID ITEM_ID,
      p.PRODUCT_NAME ITEM_NAME,
      p.PRODUCT_DESC ITEM_DESC,
      PRICE,
      RETAIL_PRICE
      FROM 
        fact_store_authorized_items fsai,
        products p
      WHERE
         p.PRODUCT_ID = fsai.ITEM_ID AND
         fsai.STORE_ID = :storeId
      LIMIT :size OFFSET :offset
