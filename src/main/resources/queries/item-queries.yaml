item:
  queries:
    divisionsByStoreId: |
      SELECT 
      	d.DIVISION_NAME_ID, 
        d.DIVISION, 
        d.DIVNAME
      FROM 
      	VW_DIVISION d,
        VW_STORE s,
      WHERE 
          d.DIVISION_NAME_ID = s.DIVISION_NAME_ID AND 
          s.STORE_ID = :storeId
      ORDER BY DIVISION_NAME_ID
    commoditiesByStoreId: |
      SELECT 
      	DISTINCT(c.COMMODITY_ID) as COMMODITY_ID,
        c.COMMODITY as COMMODITY
      FROM 
      	VW_COMMODITY c,
        VW_STORE s
      WHERE 
          c.DIVISION_NAME_ID = s.DIVISION_NAME_ID AND 
          s.STORE_ID = :storeId
      ORDER BY COMMODITY_ID
    itemById: |
      SELECT
        DIVISION_NAME_ID as division,
        COMMODITY,
        UPC_CODE,
        ITEM_ID,
        ITEM_NAME,
        ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        STORE_ID
      FROM 
        VW_AUTHORIZED_PRODUCT_CATALOG
      WHERE
         STORE_ID = :storeId AND
         ITEM_ID = :itemId
      LIMIT 1
    allItemsByIdIn:
      SELECT
        DIVISION_NAME_ID as division,
        COMMODITY,
        UPC_CODE,
        ITEM_ID,
        ITEM_NAME,
        ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        STORE_ID
      FROM
        VW_AUTHORIZED_PRODUCT_CATALOG
      WHERE
        STORE_ID = :storeId AND
        ITEM_ID IN (:itemIds)
    itemCountByStoreId: |
      SELECT
        COUNT(*)
      FROM 
        VW_AUTHORIZED_PRODUCT_CATALOG
      WHERE
         STORE_ID = :storeId
    allItemsByStoreId: |
      SELECT
        DIVISION_NAME_ID as DIVISION,
        COMMODITY,
        UPC_CODE,
        ITEM_ID,
        ITEM_NAME,
        ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        STORE_ID
      FROM 
        VW_AUTHORIZED_PRODUCT_CATALOG
      WHERE
         STORE_ID = :storeId
    searchItemsByStoreIdAndSearchKeyword: |
      SELECT
        DISTINCT(ITEM_ID),
        DIVISION_NAME_ID as division,
        COMMODITY,
        UPC_CODE,
        ITEM_ID,
        ITEM_NAME,
        ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        STORE_ID
      FROM 
        VW_AUTHORIZED_PRODUCT_CATALOG
      WHERE
         STORE_ID = :storeId AND
         ITEM_ID ILIKE :search OR 
         ITEM_DESC ILIKE :search OR 
         UPC_CODE ILIKE :search OR 
         COMMODITY ILIKE :search OR 
         DIVISION_NAME_ID ILIKE :search
      LIMIT :size
    allItemsWithStoreIds:
      SELECT
        ITEM_ID,
        ITEM_NAME,
        ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        UPC_CODE,
        DIVISION_NAME_ID as DIVISION,
        COMMODITY,
        LISTAGG(DISTINCT STORE_ID, ',') AS STORE_IDS
      FROM
        VW_AUTHORIZED_PRODUCT_CATALOG
      GROUP BY
        ITEM_ID,
        ITEM_NAME,
        ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        UPC_CODE,
        DIVISION_NAME_ID,
        COMMODITY
      LIMIT :size OFFSET :offset
