item:
  queries:
    divisionsByStoreId: |
      SELECT 
      	DISTINCT(d.DIVISION_NAME_ID), 
          d.DIVISION, 
          d.DIVNAME
      FROM 
      	division d,
          fact_store_authorized_items fsai
      WHERE 
          d.DIVISION_NAME_ID = fsai.DIVISION_NAME_ID AND 
          fsai.STORE_ID = :storeId
      ORDER BY DIVISION_NAME_ID
    commoditiesByStoreId: |
      SELECT 
      	DISTINCT(c.COMMODITY_ID), 
          c.COMMODITY
      FROM 
      	commodity c,
          fact_store_authorized_items fsai
      WHERE 
          c.COMMODITY_ID = fsai.COMMODITY_ID AND 
          fsai.STORE_ID = :storeId
      ORDER BY COMMODITY_ID
    itemById: |
      SELECT
        DIVISION_NAME_ID as division,
        COMMODITY_ID as COMMODITY,
        i.UPC_CODE,
        i.ITEM_ID,
        i.ITEM_NAME,
        i.ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        fsai.STORE_ID as STORE_ID
      FROM 
        fact_store_authorized_items fsai,
        items i
      WHERE
         i.ITEM_ID = fsai.ITEM_ID AND
         i.ITEM_ID = :itemId
    itemCountByStoreId: |
            SELECT
              COUNT(*)
            FROM 
              fact_store_authorized_items fsai,
              items i
            WHERE
               i.ITEM_ID = fsai.ITEM_ID AND
               fsai.STORE_ID = :storeId
    allItemsByStoreId: |
      SELECT
        DIVISION_NAME_ID as division,
        COMMODITY_ID as COMMODITY,
        i.UPC_CODE,
        i.ITEM_ID,
        i.ITEM_NAME,
        i.ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        fsai.STORE_ID as STORE_ID
      FROM 
        fact_store_authorized_items fsai,
        items i
      WHERE
         i.ITEM_ID = fsai.ITEM_ID AND
         fsai.STORE_ID = :storeId
    searchItemsByStoreIdAndSearchKeyword: |
      SELECT
        DIVISION_NAME_ID as division,
        COMMODITY_ID as COMMODITY,
        i.UPC_CODE,
        i.ITEM_ID,
        i.ITEM_NAME,
        i.ITEM_DESC,
        PRICE,
        RETAIL_PRICE,
        fsai.STORE_ID as STORE_ID
      FROM 
        fact_store_authorized_items fsai,
        items i
      WHERE
         i.ITEM_ID = fsai.ITEM_ID AND
         fsai.STORE_ID = :storeId AND
         i.item_name LIKE :search OR 
         i.item_desc LIKE :search OR 
         i.upc_code LIKE :search OR 
         COMMODITY_ID LIKE :search OR 
         DIVISION_NAME_ID LIKE :search
      LIMIT :size
