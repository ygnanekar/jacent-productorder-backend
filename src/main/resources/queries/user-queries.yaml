user:
  queries:
    userByUserId: SELECT user_id, email, first_name, last_name, password_hash as password, store_id, enabled, locked FROM users WHERE user_id = :userId
    userByEmail: SELECT user_id, email, first_name, last_name, password_hash as password, store_id, enabled, locked FROM users WHERE email = :email
    emailExists: SELECT EXISTS(SELECT 1 FROM users WHERE email = :email)
    createUser: INSERT INTO users (first_name, last_name, email, password_hash, store_id, enabled, locked, created_at, updated_at)
                  VALUES (:firstName, :lastName, :email, :password, :storeId, :isEnabled, :isLocked, NOW(), NOW())
    activateUser: |
      UPDATE users SET password_hash= :encodedPassword, enabled= true, updated_at = :now WHERE user_id= :userId AND enabled= false
    updatePassword: UPDATE users SET password_hash= :encodedPassword, updated_at = :now WHERE user_id = :userId

