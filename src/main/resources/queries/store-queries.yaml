store:
  queries:
    storeById: SELECT STORE_ID, COMPANYNAME, STORE_NUMBER, LOCATION_ID, DIVISION_NAME_ID FROM VW_STORE WHERE STORE_ID= :storeId
    locationByLocationId: SELECT LOCATION_ID, LOCATION_NAME, LOCATION_FULLNAME, ADDR1, ADDR2, CITY, STATE, ZIP, COUNTRY FROM VW_LOCATION WHERE LOCATION_ID= :locationId
